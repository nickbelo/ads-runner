<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ads Runner — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* ── Warm light theme — matches admin.html ───────────────────────────────── */
  :root {
    --bg:         #f5f4f0;
    --surface:    #ffffff;
    --surface2:   #f9f8f5;
    --border:     #e5e3dc;
    --border2:    #d4d0c8;
    --text:       #1c1917;
    --text2:      #44403c;
    --muted:      #78716c;
    --accent:     #5b4cf5;
    --accent-bg:  #eeecfd;
    --accent-dim: #ddd9fb;
    --red:        #dc2626;
    --red-bg:     #fee2e2;
    --green:      #16a34a;
    --shadow-sm:  0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md:  0 4px 16px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Geist', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Subtle warm dot grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, #c8c4bc 1px, transparent 1px);
    background-size: 28px 28px;
    opacity: 0.45;
    pointer-events: none;
  }

  /* Soft accent glow from top */
  body::after {
    content: '';
    position: fixed;
    top: -160px;
    left: 50%;
    transform: translateX(-50%);
    width: 560px;
    height: 480px;
    background: radial-gradient(circle, rgba(91,76,245,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ── Login card ───────────────────────────────────────────────────────────── */
  .login-wrap {
    width: 100%;
    max-width: 384px;
    padding: 20px;
    position: relative;
    z-index: 1;
    animation: rise 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Logo mark ────────────────────────────────────────────────────────────── */
  .logo-mark {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
  }

  .logo-icon {
    width: 34px;
    height: 34px;
    background: var(--accent);
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    color: #fff;
    box-shadow: 0 2px 8px rgba(91,76,245,0.25);
    flex-shrink: 0;
  }

  .logo-text {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--text);
  }

  .logo-sub {
    font-size: 11px;
    color: var(--muted);
    font-family: 'Geist Mono', monospace;
    margin-top: 1px;
  }

  /* ── Card ─────────────────────────────────────────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    box-shadow: var(--shadow-md);
  }

  .card h1 {
    font-size: 19px;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin-bottom: 5px;
    color: var(--text);
  }

  .card p {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 24px;
    line-height: 1.5;
  }

  /* ── Form field ───────────────────────────────────────────────────────────── */
  .field { margin-bottom: 16px; }

  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 7px;
    font-family: 'Geist Mono', monospace;
  }

  .input-wrap { position: relative; }

  .field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 9px;
    padding: 10px 42px 10px 13px;
    color: var(--text);
    font-family: 'Geist', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
  }

  .field input::placeholder { color: var(--muted); }

  .field input:focus {
    background: var(--surface);
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  /* ── Show/hide password toggle ────────────────────────────────────────────── */
  .toggle-pw {
    position: absolute;
    right: 11px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 15px;
    padding: 4px;
    line-height: 1;
    transition: color 0.15s;
    border-radius: 4px;
  }

  .toggle-pw:hover { color: var(--text2); }

  /* ── Error message ────────────────────────────────────────────────────────── */
  #error-msg {
    display: none;
    background: var(--red-bg);
    border: 1px solid #fca5a5;
    border-radius: 8px;
    padding: 9px 13px;
    font-size: 13px;
    color: var(--red);
    margin-bottom: 16px;
    animation: shake 0.28s ease;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%      { transform: translateX(-5px); }
    75%      { transform: translateX(5px); }
  }

  #error-msg.show { display: block; }

  /* ── Sign in button ───────────────────────────────────────────────────────── */
  .btn-login {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 9px;
    padding: 11px;
    font-family: 'Geist', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s, transform 0.1s, box-shadow 0.15s;
    box-shadow: 0 2px 8px rgba(91,76,245,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 6px;
  }

  .btn-login:hover:not(:disabled) {
    background: #4a3ce0;
    box-shadow: 0 4px 16px rgba(91,76,245,0.35);
  }

  .btn-login:active:not(:disabled) { transform: scale(0.98); }

  .btn-login:disabled { opacity: 0.55; cursor: not-allowed; }

  /* Spinner inside button */
  .btn-spinner {
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,0.35);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .btn-login.loading .btn-label  { display: none; }
  .btn-login.loading .btn-spinner { display: block; }

  /* ── Footer note ──────────────────────────────────────────────────────────── */
  .footer-note {
    text-align: center;
    margin-top: 18px;
    font-size: 11px;
    color: var(--muted);
    font-family: 'Geist Mono', monospace;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>

<div class="login-wrap">

  <div class="logo-mark">
    <div class="logo-icon">▶</div>
    <div>
      <div class="logo-text">Ads Runner</div>
      <div class="logo-sub">raspberrypi-1.local</div>
    </div>
  </div>

  <div class="card">
    <h1>Welcome back</h1>
    <p>Sign in to manage your media playlist and uploads.</p>

    <div id="error-msg"></div>

    <div class="field">
      <label>Password</label>
      <div class="input-wrap">
        <input
          type="password"
          id="password"
          placeholder="Enter admin password"
          autocomplete="current-password"
          autofocus
        >
        <button class="toggle-pw" type="button" onclick="togglePassword()" title="Show/hide password">
          <span id="pw-eye">👁</span>
        </button>
      </div>
    </div>

    <button class="btn-login" id="login-btn" onclick="doLogin()">
      <span class="btn-label">Sign in</span>
      <span class="btn-spinner"></span>
    </button>
  </div>

  <div class="footer-note">Admin access only · local network</div>

</div>

<script>
  const passwordInput = document.getElementById('password');
  const loginBtn = document.getElementById('login-btn');
  const errorMsg = document.getElementById('error-msg');

  passwordInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  function togglePassword() {
    const isHidden = passwordInput.type === 'password';
    passwordInput.type = isHidden ? 'text' : 'password';
    document.getElementById('pw-eye').textContent = isHidden ? '🙈' : '👁';
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.remove('show');
    void errorMsg.offsetWidth;
    errorMsg.classList.add('show');
  }

  async function doLogin() {
    const password = passwordInput.value;
    if (!password) {
      showError('Please enter your password.');
      passwordInput.focus();
      return;
    }

    loginBtn.classList.add('loading');
    loginBtn.disabled = true;
    errorMsg.classList.remove('show');

    try {
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      });

      const data = await res.json();

      if (res.ok && data.ok) {
        loginBtn.style.background = '#16a34a';
        loginBtn.style.boxShadow = '0 2px 8px rgba(22,163,74,0.3)';
        await new Promise(r => setTimeout(r, 380));
        window.location.href = '/';
      } else {
        showError(data.error || 'Login failed. Please try again.');
        passwordInput.value = '';
        passwordInput.focus();
      }
    } catch (err) {
      showError('Could not reach the server. Check your connection.');
    } finally {
      loginBtn.classList.remove('loading');
      loginBtn.disabled = false;
      loginBtn.style.background = '';
      loginBtn.style.boxShadow = '';
    }
  }
</script>
</body>
</html>
