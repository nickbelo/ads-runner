<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ads Runner — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #09090b;
    --surface: #111114;
    --surface2: #1a1a1f;
    --border: #222228;
    --border2: #2e2e38;
    --text: #ededf0;
    --muted: #5a5a6e;
    --accent: #7c6af5;
    --accent-glow: rgba(124, 106, 245, 0.15);
    --red: #f87171;
    --red-dim: rgba(248, 113, 113, 0.1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,106,245,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,245,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  /* Glow orb */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(124,106,245,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .login-wrap {
    width: 100%;
    max-width: 380px;
    padding: 24px;
    position: relative;
    z-index: 1;
    animation: rise 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Logo mark */
  .logo-mark {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 36px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 24px var(--accent-glow);
  }

  .logo-text {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.01em;
    color: var(--text);
  }

  .logo-sub {
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 16px;
    padding: 28px;
    box-shadow: 0 4px 40px rgba(0,0,0,0.4);
  }

  .card h1 {
    font-size: 20px;
    font-weight: 500;
    margin-bottom: 6px;
    color: var(--text);
  }

  .card p {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 28px;
    line-height: 1.5;
  }

  /* Form */
  .field {
    margin-bottom: 16px;
  }

  .field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 8px;
    font-family: 'DM Mono', monospace;
  }

  .input-wrap {
    position: relative;
  }

  .field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 11px 44px 11px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  /* Show/hide password toggle */
  .toggle-pw {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 16px;
    padding: 4px;
    line-height: 1;
    transition: color 0.15s;
  }

  .toggle-pw:hover { color: var(--text); }

  /* Error message */
  #error-msg {
    display: none;
    background: var(--red-dim);
    border: 1px solid rgba(248, 113, 113, 0.2);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--red);
    margin-bottom: 16px;
    animation: shake 0.3s ease;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%      { transform: translateX(-6px); }
    75%      { transform: translateX(6px); }
  }

  #error-msg.show { display: block; }

  /* Submit button */
  .btn-login {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 4px 20px var(--accent-glow);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 8px;
  }

  .btn-login:hover:not(:disabled) {
    opacity: 0.9;
    box-shadow: 0 4px 28px rgba(124,106,245,0.35);
  }

  .btn-login:active:not(:disabled) { transform: scale(0.98); }

  .btn-login:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  /* Spinner inside button */
  .btn-spinner {
    width: 15px;
    height: 15px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .btn-login.loading .btn-label { display: none; }
  .btn-login.loading .btn-spinner { display: block; }

  /* Footer note */
  .footer-note {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
</style>
</head>
<body>

<div class="login-wrap">

  <div class="logo-mark">
    <div class="logo-icon">▶</div>
    <div>
      <div class="logo-text">Ads Runner</div>
      <div class="logo-sub">raspberrypi-1.local</div>
    </div>
  </div>

  <div class="card">
    <h1>Welcome back</h1>
    <p>Sign in to manage your media playlist and uploads.</p>

    <div id="error-msg"></div>

    <div class="field">
      <label>Password</label>
      <div class="input-wrap">
        <input
          type="password"
          id="password"
          placeholder="Enter admin password"
          autocomplete="current-password"
          autofocus
        >
        <button class="toggle-pw" type="button" onclick="togglePassword()" title="Show/hide password">
          <span id="pw-eye">👁</span>
        </button>
      </div>
    </div>

    <button class="btn-login" id="login-btn" onclick="doLogin()">
      <span class="btn-label">Sign in</span>
      <span class="btn-spinner"></span>
    </button>
  </div>

  <div class="footer-note">Admin access only · local network</div>

</div>

<script>
  const passwordInput = document.getElementById('password');
  const loginBtn = document.getElementById('login-btn');
  const errorMsg = document.getElementById('error-msg');

  // Allow Enter key to submit
  passwordInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  function togglePassword() {
    const isHidden = passwordInput.type === 'password';
    passwordInput.type = isHidden ? 'text' : 'password';
    document.getElementById('pw-eye').textContent = isHidden ? '🙈' : '👁';
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.remove('show');
    // Force reflow to restart animation
    void errorMsg.offsetWidth;
    errorMsg.classList.add('show');
  }

  async function doLogin() {
    const password = passwordInput.value;
    if (!password) {
      showError('Please enter your password.');
      passwordInput.focus();
      return;
    }

    loginBtn.classList.add('loading');
    loginBtn.disabled = true;
    errorMsg.classList.remove('show');

    try {
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      });

      const data = await res.json();

      if (res.ok && data.ok) {
        // Small success pause before redirect for UX feel
        loginBtn.style.background = '#4ade80';
        await new Promise(r => setTimeout(r, 400));
        window.location.href = '/';
      } else {
        showError(data.error || 'Login failed. Please try again.');
        passwordInput.value = '';
        passwordInput.focus();
      }
    } catch (err) {
      showError('Could not reach the server. Check your connection.');
    } finally {
      loginBtn.classList.remove('loading');
      loginBtn.disabled = false;
      loginBtn.style.background = '';
    }
  }
</script>
</body>
</html>
